version: 2

project_name: polymarket-go

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: pmctl
    main: ./cmd/pmctl
    binary: pmctl
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
  - id: polymarket-mcp
    main: ./cmd/polymarket-mcp
    binary: polymarket-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: pmctl
    ids:
      - pmctl
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
  - id: polymarket-mcp
    ids:
      - polymarket-mcp
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}-mcp_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}

checksum:
  name_template: checksums.txt

changelog:
  disable: false
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# When a previous run partially uploaded assets, GitHub returns 422 already_exists.
# This deletes the conflicting asset and retries (GitHub-only, see GoReleaser docs).
release:
  replace_existing_artifacts: true

brews:
  - name: polymarket-cli
    # Set repository variable SKIP_HOMEBREW_TAP=true to publish GitHub release only (no tap commit).
    skip_upload: '{{ eq .Env.SKIP_HOMEBREW_TAP "true" }}'
    ids:
      - pmctl
    repository:
      owner: 0xfakeSpike
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/0xfakeSpike/polymarket-go
    description: Polymarket companion CLI (pmctl)
    license: MIT
    install: |
      bin.install "pmctl"
    test: |
      assert_match "pmctl - Polymarket CLI", shell_output("#{bin}/pmctl 2>&1", 2)
  - name: polymarket-mcp
    skip_upload: '{{ eq .Env.SKIP_HOMEBREW_TAP "true" }}'
    ids:
      - polymarket-mcp
    repository:
      owner: 0xfakeSpike
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/0xfakeSpike/polymarket-go
    description: Polymarket MCP stdio bridge
    license: MIT
    install: |
      bin.install "polymarket-mcp"
    test: |
      shell_output("#{bin}/polymarket-mcp </dev/null")
